# version: "3.9"

services:

  scraper:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: immo_scraper
    volumes:  
      - .:/app
    working_dir: /app/ingestion 
    command: >
      sh -c "
      sleep 15 &&
      scrapy crawl senscritique &&
      scrapy crawl topito
      "
    depends_on:
      - kafka
    networks:
      - immo-network

# ==============================================
# SERVICE : POSTGRESQL 
# ==============================================
  postgres:
    image: postgres:15
    container_name: immo_postgres
    environment:
      POSTGRES_USER: immo
      POSTGRES_PASSWORD: immo12
      POSTGRES_DB: immo_db
    ports:
      - "5432:5432"
    networks:
      - immo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immo -d immo_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

# ==============================================
# SERVICE : Kafka 
# ==============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - immo-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: immo_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - immo-network

# ==============================================
# SERVICE : Spark 
# ==============================================
  spark-master:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: immo_spark_master
    environment:
      - SPARK_MASTER_HOST=spark-master
      # - SPARK_MASTER_PORT=7077
      - NAMENODE_HOST=namenode
      - SPARK_ROLE=master
      - SPARK_ROLE=submit
    depends_on:
      - kafka
    ports:
      - "8080:8080" # Interface Web pour voir tes jobs
      - "7077:7077"
    volumes:
      - ./data_lake:/opt/spark/data_lake
    networks:
      - immo-network

  spark-worker:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: immo_spark_worker
    environment:
      - SPARK_ROLE=worker
      - SPARK_MASTER_HOST=spark-master
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./data_lake:/opt/spark/data_lake
    networks:
      - immo-network
  
    spark-submit:
      build:
        context: ./processing
        dockerfile: Dockerfile
      container_name: immo_spark_submit
      depends_on:
        - kafka
        - spark-master
      command: >
        spark-submit
        --master spark://spark-master:7077
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.2
        /opt/spark/jobs/streaming_job.py
      networks:
        - immo-network

# ==============================================
# SERVICE : airflow 
# ==============================================
  airflow:
    image: apache/airflow:2.9.0
    container_name: immo_airflow
    restart: always
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://immo:immo12@postgres/immo_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/app
    ports:
      - "8085:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname admin \
        --role Admin \
        --email admin@mail.com &&
      airflow scheduler &
      airflow webserver
      "
    networks:
      - immo-network

