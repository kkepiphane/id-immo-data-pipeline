# version: "3.9"
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:

  scraper:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    image: immo_scraper:latest
    container_name: immo_scraper
    volumes:
      - .:/app
    working_dir: /app/ingestion
    command: tail -f /dev/null
    depends_on:
      - kafka
      - kafka-init
    networks:
      - immo-network

  # ==============================================
  # SERVICE : Kafka 
  # ==============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - immo-network

  kafka-init:
    image: confluentinc/cp-kafka:7.3.0
    container_name: immo_kafka_init
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
        until kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka..."
          sleep 5
        done

        kafka-topics --create \
          --topic immo_raw \
          --bootstrap-server kafka:9092 \
          --replication-factor 1 \
          --partitions 1 || true
      "
    networks:
      - immo-network
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: immo_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - immo-network
    # ==============================================
    # SERVICE : HDFS
    # ==============================================
  namenode:
    build:
      context: ./hdfs
      dockerfile: Dockerfile.namenode
    container_name: namenode
    environment:
      - CLUSTER_NAME=immo-cluster
    ports:
      - "9870:9870" # UI Web HDFS
      - "8020:8020" # RPC
    volumes:
      - namenode-data:/hadoop/dfs/name
    networks:
      - immo-network
    healthcheck:
      test: [ "CMD", "hdfs", "dfs", "-ls", "/" ]
      interval: 10s
      retries: 5

  datanode:
    build:
      context: ./hdfs
      dockerfile: Dockerfile.datanode
    container_name: datanode
    environment:
      - CLUSTER_NAME=immo-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - datanode-data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - immo-network
    healthcheck:
      test: [ "CMD", "hdfs", "dfs", "-ls", "/" ]
      interval: 10s
      retries: 5
  # ==============================================
  # SERVICE : Spark 
  # ==============================================
  spark-master:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: immo_spark_master
    environment:
      - SPARK_MASTER_HOST=spark-master
      # - SPARK_MASTER_PORT=7077
      - NAMENODE_HOST=namenode
      - SPARK_ROLE=master
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - kafka
    ports:
      - "8082:8080" # Interface Web pour voir tes jobs
      - "7077:7077"
    volumes:
      - ./data_lake:/opt/spark/data_lake
    networks:
      - immo-network

  spark-worker:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: immo_spark_worker
    environment:
      - SPARK_ROLE=worker
      - SPARK_MASTER_HOST=spark-master
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./data_lake:/opt/spark/data_lake
    networks:
      - immo-network

  # =============================================================================
  # SERVICE : POSTGRESQL – Data Warehouse (Serving Layer)
  # =============================================================================
  postgres-dw:
    image: postgres:15-alpine
    container_name: immo-postgres-dw
    hostname: postgres-dw
    networks:
      immo-network: # ipv4_address: 172.20.0.40
    ports:
      - "5434:5432"
    volumes:
      - postgres-dw-data:/var/lib/postgresql/data
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      POSTGRES_USER: dw_admin
      POSTGRES_PASSWORD: dwpassword
      POSTGRES_DB: real_estate_dw
    logging: *default-logging
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dw_admin -d real_estate_dw" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # SERVICE : POSTGRESQL – Airflow Metadata (séparée du DW)
  # =============================================================================
  postgres-airflow:
    image: postgres:15-alpine
    container_name: immo-postgres-airflow
    hostname: postgres-airflow
    networks:
      immo-network: # ipv4_address: 172.20.0.41
    ports:
      - "5433:5432"
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_meta
    logging: *default-logging
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow_user -d airflow_meta" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # SERVICE : APACHE AIRFLOW – Orchestration & Scheduling
  # =============================================================================
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    networks:
      - immo-network
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres-airflow:5432/airflow_meta
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_123
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
        --username admin \
        --password admin \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@example.com || true

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    ports:
      - "8888:8080"
    networks:
      - immo-network
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres-airflow:5432/airflow_meta
      - AIRFLOW_CONN_SPARK_MASTER=spark://spark-master:7077
      - AIRFLOW_CONN_POSTGRES_DW=postgresql://dw_admin:dwpassword@postgres-dw:5432/real_estate_dw
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_123 #q generer plus tard tu peux faire : command  => openssl rand -hex 32
    command: airflow webserver

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    networks:
      - immo-network
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres-airflow:5432/airflow_meta
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_123
    command: airflow scheduler
